
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CJ Phone</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="favicon.png">
        <link rel="stylesheet" type="text/css" href="phone.css">

    </head>
    <body>
            <div class="sidebar">
                <!--Player List from Discord-->
                <p>Players</p>
                <ul id="playerList">
                    <li>Loading...</li>
                </ul>
            </div>
        <div id="menu">
            <div class="main centered">
                <div class="header">
                    <h1>CJ Phone</h1>
                </div>
                <div class="content">
                    <button id="Start" disabled>Begin Game</button>
                    <p id="startText"></p>
                    <p>Two or more players are required to begin the game.</p>
                </div>
            </div>
        </div>
        <div id="game" class="centered force-hidden">
            <div id="sentence" class="centered">
                <!--Sentence Selection-->
                <input type="text" id="sentenceInput" maxlength="100" placeholder="Enter a sentence...">
                <p id="charCount">0/100 characters used</p>
                <button id="submitSentence">Submit</button>
                <p id="submitText"></p>
            </div>
            <div id="drawing" class="horizontal force-hidden">
                <!--Drawing Area-->
                <div class="vertical" id="drawingSidebar">
                    <p id="drawingPrompt"></p>
                    <div id="colorPicker">
                        <button class="color-btn blackButton" data-color="black" title="black"> </button>
                        <button class="color-btn redButton" data-color="red" title="red"> </button>
                        <button class="color-btn yellowButton" data-color="yellow" title="yellow"> </button>
                        <button class="color-btn greenButton" data-color="green" title="green"> </button>
                        <button class="color-btn blueButton" data-color="blue" title="blue"> </button>
                        <button class="color-btn purpleButton" data-color="purple" title="purple"> </button>
                        <button class="color-btn whiteButton" data-color="white" title="white"> </button>
                    </div>
                    <div id="toolPicker">
                        <button class="tool-btn whiteButton" data-tool="brush" title="Brush">Pencil</button>
                        <button class="tool-btn whiteButton" data-tool="fill" title="Fill">Fill</button>
                    </div>
                    <button id="submitDrawing">Submit Drawing</button>
                    <p id="submitDrawingText"></p>
                </div>
            <canvas id="canvas" width="350" height="350"></canvas>
            </div>
            <div id="guess" class="horizontal force-hidden">
                <div class="vertical">
                    <p>What does this drawing show?</p>
                    <input type="text" id="guessInput" maxlength="100" placeholder="Enter your guess...">
                    <button id="submitGuess">Submit Guess</button>
                    <p id="submitGuessText"></p>
                </div>
                <img id="referenceImage" alt="Drawing to guess">
            </div>
            <div id="gameOver" class="centered force-hidden">
                <h2>Results</h2>
                <div id="chains"></div>
            </div>
        </div>
    </body>
</html>
<script type="module" src="bundle.js"></script>
